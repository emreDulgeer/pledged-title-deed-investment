version: "3.8"

services:
  mongo:
    image: mongo:6.0
    container_name: pledged-mongo
    restart: always
    ports:
      - "27021:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: pledged_platform

  minio:
    image: minio/minio:latest
    container_name: pledged-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: pledgedminio
      MINIO_ROOT_PASSWORD: pledgedminio123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # backend:
